name: Windows Build

on:
  push:
    paths-ignore:
      - '.github/workflows/cmake-linux.yml'
  pull_request:
    paths-ignore:
      - '.github/workflows/cmake-linux.yml'

env:
    # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
    BUILD_TYPE: Debug

jobs:
    build:
        # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
        # You can convert this to a matrix build if you need cross-platform coverage.
        # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: "recursive"

            - name: Configure CMake
              # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
              # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
              working-directory: ${{github.workspace}}
              run: cmake -DCMAKE_POLICY_VERSION_MINIMUM="3.5" -DTRACY_ENABLE=0 -S . -B Build_Win64

            - name: Build libculTests
              # Build your program with the given configuration
              working-directory: ${{github.workspace}}/Build_Win64
              run: cmake --build . --config Debug --target libculTests_static libculTests_dynamic --parallel

            - name: Run libculTests_dynamic
              shell: cmd
              working-directory: ${{github.workspace}}/runDir
              run: ..\Build_Win64\Debug\libculTests_dynamic.exe

            - name: Run libculTests_static
              shell: cmd
              working-directory: ${{github.workspace}}/runDir
              run: ..\Build_Win64\Debug\libculTests_static.exe
